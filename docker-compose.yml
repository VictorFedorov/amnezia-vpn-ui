services:
  backend:
    build: 
      context: ./backend
    container_name: amnezia_backend
    volumes:
      - ./backend:/app
      # Исключаем venv из volume, чтобы использовать тот, что внутри контейнера
      - /app/venv
      # БД хранится в named volume (персистентно между перезапусками)
      - db_data:/app/data
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Переопределяем путь к БД чтобы она хранилась в volume
      - DATABASE_URL=sqlite:///./data/vpn_manager.db
    # Команда запускает миграции, потом создает админа, потом стартует сервер
    # Миграции, затем сервер (admin создаётся автоматически при startup в main.py)
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: amnezia_frontend
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      # URL бэкенда для проксирования или прямых запросов
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
    driver: local
